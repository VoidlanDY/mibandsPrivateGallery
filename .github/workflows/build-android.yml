name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - debug
          - release
        default: 'debug'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Generate Gradle wrapper
        run: |
          cd android_app
          gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        run: |
          cd android_app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release' }}
        run: |
          cd android_app
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PrivateGalleryCompanion-debug
          path: android_app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: PrivateGalleryCompanion-release
          path: android_app/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload build reports (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-logs
          path: android_app/app/build/reports/
          retention-days: 7
