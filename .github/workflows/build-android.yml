name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - debug
          - release
        default: 'debug'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Debug environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la "$ANDROID_HOME" 2>/dev/null || echo "ANDROID_HOME not accessible"
          ls -la "$ANDROID_SDK_ROOT" 2>/dev/null || echo "ANDROID_SDK_ROOT not accessible"

      - name: Create local.properties
        run: |
          cd android_app
          # Try both env vars
          SDK_DIR="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          if [ -z "$SDK_DIR" ]; then
            echo "ERROR: No Android SDK found!"
            exit 1
          fi
          echo "sdk.dir=$SDK_DIR" > local.properties
          cat local.properties

      - name: Setup Gradle wrapper
        run: |
          cd android_app
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd android_app
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List APK files
        run: |
          echo "=== APK files found ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "(none)"
          echo "=== Build outputs ==="
          find android_app/app/build -type f 2>/dev/null | head -20 || echo "(none)"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PrivateGalleryCompanion-debug
          path: android_app/app/build/outputs/apk/**/*.apk
          retention-days: 30
