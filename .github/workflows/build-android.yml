name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - debug
          - release
        default: 'debug'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Create local.properties
        run: |
          cd android_app
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: Download and setup Gradle
        run: |
          cd android_app
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd android_app
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        run: |
          echo "=== Searching for APK files ==="
          find android_app -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo ""
          echo "=== Build output tree ==="
          find android_app/app/build/outputs -type f 2>/dev/null | head -30 || echo "No build outputs"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PrivateGalleryCompanion-debug
          path: android_app/app/build/outputs/apk/**/*.apk
          retention-days: 30
